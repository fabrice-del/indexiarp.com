<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Articles sur le GEO, les LLM et les relations publiques. Strategies et conseils pour optimiser votre visibilite dans ChatGPT, Perplexity et Gemini.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange:  #F46C23;
    --orange-2:#FF8547;
    --bg:      #0F1115;
    --bg-2:    #15181F;
    --bg-3:    #1C1F28;
    --line:    rgba(255,255,255,0.08);
    --line-2:  rgba(255,255,255,0.04);
    --text:    #F0F2F5;
    --text-2:  rgba(240,242,245,0.65);
    --text-3:  rgba(240,242,245,0.40);
    --serif:   'Instrument Serif', Georgia, serif;
    --sans:    'Inter', -apple-system, sans-serif;
    --mono:    'JetBrains Mono', ui-monospace, monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    line-height: 1.5;
  }

  a { color:inherit; text-decoration:none; }
  ::selection { background:var(--orange); color:#000; }

  body::before {
    content:'';
    position:fixed; inset:0;
    pointer-events:none; z-index:1; opacity:0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 40px;
    position: relative;
    z-index: 2;
  }

  /* ── HERO ── */
  .blog-page-wrapper {
    background:
      radial-gradient(ellipse 90% 45% at 8% 12%, rgba(244,108,35,0.11) 0%, transparent 70%),
      var(--bg);
  }
  .blog-hero {
    padding: 100px 0 60px;
    position: relative;
    z-index: 1;
  }
  .blog-hero-grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(var(--line-2) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-2) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: linear-gradient(to bottom, black 20%, transparent 75%);
    pointer-events: none;
    z-index: 1;
  }

  .blog-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-3);
    display: inline-flex; align-items:center; gap:10px;
    margin-bottom: 28px;
  }
  .blog-eyebrow::before {
    content:''; width:18px; height:1px; background:var(--orange);
  }
  .blog-hero h1 {
    font-family: var(--serif);
    font-size: clamp(42px, 6vw, 72px);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  .blog-hero h1 em {
    font-style: italic;
    color: var(--orange);
  }
  .blog-hero p {
    font-size: 17px;
    color: var(--text-2);
    max-width: 480px;
    line-height: 1.6;
  }

  /* ── BLOG GRID ── */
  .blog-section {
    padding: 40px 0 120px;
    position: relative;
    z-index: 10;
  }

  .ixia-blog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .ixia-card {
    display: block;
    text-decoration: none;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1),
                border-color 0.3s ease,
                box-shadow 0.35s ease;
  }
  .ixia-card:hover {
    transform: translateY(-6px);
    border-color: var(--orange);
    box-shadow: 0 20px 60px rgba(244,108,35,0.12);
    position: relative;
    z-index: 20;
  }

  .ixia-card-img-wrap {
    overflow: hidden;
    aspect-ratio: 16/9;
  }
  .ixia-card-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  .ixia-card:hover .ixia-card-img {
    transform: scale(1.04);
  }

  .ixia-card-placeholder {
    width: 100%; aspect-ratio:16/9;
    background: var(--bg-3);
    display:flex; align-items:center; justify-content:center;
  }

  .ixia-card-body {
    padding: 18px 20px 22px;
    border-top: 1px solid var(--line);
  }
  .ixia-card-title {
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    line-height: 1.5;
    margin: 0;
    transition: color 0.3s ease;
  }
  .ixia-card:hover .ixia-card-title {
    color: var(--orange);
  }

  .ixia-loading {
    grid-column: 1/-1;
    text-align:center;
    color: var(--text-3);
    padding: 80px 20px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
  }

  /* ── Override Elementor parent sections ── */
  .elementor-section:has(.blog-page-wrapper),
  .elementor-section:has(.blog-page-wrapper) .elementor-container,
  .elementor-section:has(.blog-page-wrapper) .elementor-column,
  .elementor-section:has(.blog-page-wrapper) .elementor-widget-wrap,
  .elementor-section:has(.blog-page-wrapper) .elementor-widget-container,
  .e-con:has(.blog-page-wrapper),
  .e-con:has(.blog-page-wrapper) > .e-con-inner {
    background: transparent !important;
    background-color: transparent !important;
    padding-top: 0 !important;
    padding-bottom: 0 !important;
  }

  @media (max-width: 900px) {
    .ixia-blog-grid { grid-template-columns: repeat(2,1fr); }
  }
  @media (max-width: 560px) {
    .ixia-blog-grid { grid-template-columns: 1fr; }
    .container { padding:0 20px; }
    .blog-hero { padding: 72px 0 120px; }
  }
</style>
</head>
<body>

<div class="blog-page-wrapper">
<section class="blog-hero">
  <div class="blog-hero-grid"></div>
  <div class="container">
    <div class="blog-eyebrow">Ressources</div>
    <h1>Nos <em>articles</em></h1>
    <p>Strategies GEO, relations publiques et visibilite dans les LLM — pour les entreprises quebecoises.</p>
  </div>
</section>

<section class="blog-section">
  <div class="container">
    <div class="ixia-blog-grid" id="ixia-blog-grid">
      <div class="ixia-loading">Chargement des articles…</div>
    </div>
  </div>
</section>
</div>

<script>
(function () {
  const grid = document.getElementById('ixia-blog-grid');

  fetch('/wp-json/wp/v2/posts?_embed&per_page=12&status=publish')
    .then(r => r.json())
    .then(posts => {
      if (!posts.length) {
        grid.innerHTML = '<div class="ixia-loading">Aucun article publie pour l\'instant.</div>';
        return;
      }

      grid.innerHTML = posts.map(post => {
        const title = post.title.rendered;
        const url   = post.link;

        let media = '';
        try {
          const fm  = post._embedded['wp:featuredmedia'][0];
          const src = fm.media_details?.sizes?.medium_large?.source_url || fm.source_url;
          media = `<div class="ixia-card-img-wrap">
            <img class="ixia-card-img" src="${src}" alt="${title}" loading="lazy">
          </div>`;
        } catch (e) {
          media = `<div class="ixia-card-placeholder">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
              stroke="rgba(244,108,35,0.35)" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>`;
        }

        return `
          <a href="${url}" class="ixia-card">
            ${media}
            <div class="ixia-card-body">
              <p class="ixia-card-title">${title}</p>
            </div>
          </a>`;
      }).join('');
    })
    .catch(() => {
      grid.innerHTML = '<div class="ixia-loading">Erreur de chargement des articles.</div>';
    });
})();

/* ─── Fix Elementor parent section backgrounds ── */
(function() {
  var wrapper = document.querySelector('.blog-page-wrapper');
  if (!wrapper) return;

  var el = wrapper;
  while (el) {
    el = el.parentElement;
    if (!el) break;

    var tag = el.tagName ? el.tagName.toLowerCase() : '';
    var cls = el.className || '';

    /* Stop at body */
    if (tag === 'body') break;

    /* Override background and padding on Elementor containers */
    if (
      cls.indexOf('elementor-section') > -1 ||
      cls.indexOf('elementor-container') > -1 ||
      cls.indexOf('elementor-column') > -1 ||
      cls.indexOf('elementor-widget-wrap') > -1 ||
      cls.indexOf('elementor-widget-container') > -1
    ) {
      el.style.background = 'transparent';
      el.style.padding    = '0';
      el.style.margin     = '0';
    }
  }
})();
</script>

</body>
</html>
