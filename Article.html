<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange:  #F46C23;
    --bg:      #0F1115;
    --bg-2:    #15181F;
    --bg-3:    #1C1F28;
    --line:    rgba(255,255,255,0.08);
    --line-2:  rgba(255,255,255,0.04);
    --text:    #F0F2F5;
    --text-2:  rgba(240,242,245,0.65);
    --text-3:  rgba(240,242,245,0.40);
    --serif:   'Instrument Serif', Georgia, serif;
    --sans:    'Inter', -apple-system, sans-serif;
    --mono:    'JetBrains Mono', ui-monospace, monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  a { color:inherit; text-decoration:none; }
  ::selection { background:var(--orange); color:#000; }

  body::before {
    content:'';
    position:fixed; inset:0;
    pointer-events:none; z-index:1; opacity:0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ── LOADING ── */
  .post-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-3);
    text-transform: uppercase;
  }

  /* ── HERO IMAGE ── */
  .post-hero {
    position: relative;
    width: 100%;
    height: 520px;
    overflow: hidden;
    background: var(--bg-3);
  }

  .post-hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.75;
  }

  .post-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 30%,
      rgba(15,17,21,0.6) 70%,
      var(--bg) 100%
    );
  }

  /* ── ARTICLE WRAPPER ── */
  .post-wrapper {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 40px 120px;
    position: relative;
    z-index: 2;
  }

  /* ── BACK LINK ── */
  .post-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin: 48px 0 40px;
    transition: color 0.3s;
  }
  .post-back:hover { color: var(--orange); }
  .post-back::before {
    content: '←';
    font-size: 14px;
  }

  /* ── META ── */
  .post-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 20px;
  }
  .post-meta-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--text-3);
  }

  /* ── TITLE ── */
  .post-title {
    font-family: var(--serif);
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 48px;
    padding-bottom: 40px;
    border-bottom: 1px solid var(--line);
  }

  /* ── CONTENT TYPOGRAPHY ── */
  .post-content {
    font-size: 17px;
    line-height: 1.8;
    color: var(--text-2);
  }

  .post-content p {
    margin-bottom: 24px;
  }

  .post-content h2 {
    font-family: var(--serif);
    font-size: clamp(26px, 3vw, 36px);
    font-weight: 400;
    color: var(--text);
    margin: 56px 0 20px;
    line-height: 1.2;
  }

  .post-content h3 {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin: 40px 0 16px;
  }

  .post-content a {
    color: var(--orange);
    border-bottom: 1px solid rgba(244,108,35,0.3);
    transition: border-color 0.3s;
  }
  .post-content a:hover { border-color: var(--orange); }

  .post-content strong { color: var(--text); font-weight: 600; }

  .post-content ul, .post-content ol {
    padding-left: 24px;
    margin-bottom: 24px;
  }
  .post-content li { margin-bottom: 8px; }

  .post-content blockquote {
    border-left: 2px solid var(--orange);
    padding: 4px 0 4px 24px;
    margin: 32px 0;
    color: var(--text-2);
    font-style: italic;
  }

  .post-content img {
    width: 100%;
    border-radius: 8px;
    margin: 32px 0;
    border: 1px solid var(--line);
  }

  .post-content pre, .post-content code {
    font-family: var(--mono);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 14px;
  }
  .post-content code { padding: 2px 8px; }
  .post-content pre { padding: 20px; overflow-x: auto; margin: 24px 0; }
  .post-content pre code { padding: 0; border: none; background: none; }

  /* ── FOOTER BACK ── */
  .post-footer {
    margin-top: 72px;
    padding-top: 40px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: center;
  }

  .post-footer-back {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    transition: color 0.3s;
  }
  .post-footer-back:hover { color: var(--orange); }
  .post-footer-back::before { content: '←'; font-size: 14px; }

  @media (max-width: 600px) {
    .post-wrapper { padding: 0 20px 80px; }
    .post-hero { height: 280px; }
  }
</style>

<div id="post-root">
  <div class="post-loading">Chargement de l'article…</div>
</div>

<script>
(function() {
  var root = document.getElementById('post-root');

  // Get post slug from URL
  var path = window.location.pathname.replace(/\/$/, '');
  var slug = path.split('/').pop();

  if (!slug) {
    root.innerHTML = '<div class="post-loading">Article introuvable.</div>';
    return;
  }

  fetch('/wp-json/wp/v2/posts?slug=' + slug + '&_embed')
    .then(function(r) { return r.json(); })
    .then(function(posts) {
      if (!posts.length) {
        root.innerHTML = '<div class="post-loading">Article introuvable.</div>';
        return;
      }

      var post = posts[0];
      var title   = post.title.rendered;
      var content = post.content.rendered;
      var date    = new Date(post.date).toLocaleDateString('fr-CA', {
        year: 'numeric', month: 'long', day: 'numeric'
      });

      // Reading time
      var words   = content.replace(/<[^>]+>/g, '').split(/\s+/).length;
      var minutes = Math.max(1, Math.ceil(words / 200));

      // Featured image
      var heroHTML = '';
      try {
        var img = post._embedded['wp:featuredmedia'][0].source_url;
        heroHTML = '<div class="post-hero">' +
          '<img class="post-hero-img" src="' + img + '" alt="' + title + '">' +
          '<div class="post-hero-overlay"></div>' +
          '</div>';
      } catch(e) {}

      root.innerHTML =
        heroHTML +
        '<div class="post-wrapper">' +
          '<a href="/blogue/" class="post-back">Retour au blogue</a>' +
          '<div class="post-meta">' +
            '<span>' + date + '</span>' +
            '<span class="post-meta-dot"></span>' +
            '<span>' + minutes + ' min de lecture</span>' +
          '</div>' +
          '<h1 class="post-title">' + title + '</h1>' +
          '<div class="post-content">' + content + '</div>' +
          '<div class="post-footer">' +
            '<a href="/blogue/" class="post-footer-back">Retour au blogue</a>' +
          '</div>' +
        '</div>';
    })
    .catch(function() {
      root.innerHTML = '<div class="post-loading">Erreur de chargement.</div>';
    });
})();
</script>
